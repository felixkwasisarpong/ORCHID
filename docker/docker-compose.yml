version: "3.9"
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uvicorn", "tools.synthetic_mcp_server.app:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      MCP_BASE_URL: "http://mcp:9000"
      OLLAMA_BASE_URL: "http://ollama:11434"
    env_file:
      - .env
    volumes:
      - ../evaluation/results:/app/evaluation/results
    ports:
      - "8000:8000"
    depends_on:
      - mcp
      - ollama

volumes:
  ollama_data:
