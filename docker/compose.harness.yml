services:
  harness:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: ${PWD}
    volumes:
      - ${PWD}:${PWD}
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOST_PWD=${PWD}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    extra_hosts:
      - host.docker.internal:host-gateway
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
