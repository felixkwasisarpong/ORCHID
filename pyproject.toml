[tool.poetry]
name = "orchid"
version = "0.1.0"
description = "Research-grade hybrid agent orchestration scaffold"
authors = ["ORCHID Contributors"]
readme = "README.md"
packages = [
  { include = "orchestrator" },
  { include = "workers" },
  { include = "tools" },
  { include = "evaluation" },
  { include = "observability" },
  { include = "api" }
]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
fastapi = "^0.110.0"
uvicorn = { version = "^0.31.1", extras = ["standard"] }
pydantic = "^2.7.0"
httpx = "^0.27.0"
crewai = { version = "^1.9.3", optional = true, extras = ["openai", "anthropic"] }
litellm = { version = "^1.40.0", optional = true }

[tool.poetry.extras]
crew = ["crewai", "litellm"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-asyncio = "^0.23.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
