orchestrators:
  - langgraph
  - crewai
  - autogen
runtimes:
  - ollama
tasks:
  - all
seeds:
  - 1
  - 2
  - 3
  - 4
  - 5
max_steps: 8
max_llm_retries: 2
max_tool_retries: 1
timeout_s: 20.0
tool_timeout_s: 10.0
sandbox_dir: evaluation/sandboxes
transport: stdio
gateway_cmd:
  - docker
  - run
  - -i
  - --rm
  - -v
  - "{sandbox_root}:/local-directory"
  - mcp/filesystem
  - /local-directory
runtime_models:
  ollama: llama3.1:latest
results_dir: evaluation/results/matrix/permission_med
faults:
  permission_path: output
  missing_path: null
  latency_ms: 0.0
  jitter_ms: 0.0
  tool_timeout_s: null
