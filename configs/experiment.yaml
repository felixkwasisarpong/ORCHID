orchestrator: langgraph
runtime:
  runtime: ollama
  model: llama3
  base_url: http://localhost:11434
  temperature: 0.0
  max_tokens: 512
episode:
  max_steps: 6
  max_llm_retries: 2
  max_tool_retries: 1
  tool_timeout_s: 10.0
runs: 1
seeds: [1]
# tasks: [create_hello, sum_numbers]
sandbox_root: evaluation/sandboxes
output_dir: evaluation/results
mcp:
  transport: stdio
  # command: docker
  # args: [mcp, gateway, run]
  reuse_session: true
faults:
  permission_path: null
  missing_path: null
  latency_ms: 0
  jitter_ms: 0
  timeout_s: null
temporal:
  address: localhost:7233
  namespace: default
  task_queue: orchid-task-queue
  workflow_timeout_s: 600
  activity_timeout_s: 120
